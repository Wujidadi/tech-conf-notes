{{- $parent := .Parent -}}
{{- if and (not .IsHome) (not $parent) .CurrentSection -}}
  {{- $parent = .CurrentSection -}}
{{- end -}}

{{- if $parent -}}
  <nav class="page-backnav" aria-label="頁面導覽">
    <a class="back-link" href="{{ $parent.RelPermalink }}" target="_blank" rel="noopener noreferrer">← 回上一頁</a>
  </nav>
{{- end -}}
