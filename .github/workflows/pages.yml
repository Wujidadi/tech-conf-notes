name: Deploy Hugo Markdown Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Create temporary Hugo site
        run: |
          mkdir -p /tmp/hugo/content

          # 複製 Markdown 到 Hugo content
          rsync -av \
            --include='*/' \
            --include='*.md' \
            --exclude='*' \
            ./ /tmp/hugo/content/

          # Hugo 首頁使用 _index.md
          if [ -f /tmp/hugo/content/index.md ]; then
            mv /tmp/hugo/content/index.md /tmp/hugo/content/_index.md
          fi

          cp ./hugo.toml /tmp/hugo/hugo.toml
          rsync -av ./layouts/ /tmp/hugo/layouts/

          if [ -d ./static ]; then
            rsync -av ./static/ /tmp/hugo/static/
          fi

          if [ -d ./assets ]; then
            rsync -av ./assets/ /tmp/hugo/assets/
          fi

      - name: Build Hugo site
        run: |
          hugo --source /tmp/hugo --destination /tmp/public --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
